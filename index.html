<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Penny - Financial Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23534AB7'/><text x='50' y='68' font-size='50' text-anchor='middle' fill='white'>P</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
:root {
  --purple: #534AB7;
  --purple-light: #EEEDFE;
  --purple-dark: #3C3489;
  --purple-gradient: linear-gradient(135deg, #534AB7 0%, #6B5BD7 100%);
  --teal: #1D9E75;
  --teal-light: #E1F5EE;
  --amber: #BA7517;
  --amber-light: #FAEEDA;
  --red: #DC3545;
  --red-light: #FDEAEC;
  --green: #28A745;
  --green-light: #E8F5E9;
  --blue: #007BFF;
  --blue-light: #E3F2FD;
  --text-primary: #1a1a1a;
  --text-secondary: #6b6b6b;
  --text-tertiary: #9c9a92;
  --border: rgba(0,0,0,0.08);
  --bg: #f5f4f7;
  --bg-secondary: #ffffff;
  --surface: #ffffff;
  --sidebar-bg: #1a1a2e;
  --sidebar-text: #a0a0b8;
  --sidebar-active: #ffffff;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
  --shadow-glow: 0 0 20px rgba(83,74,183,0.15);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --transition: all 0.2s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

#root { min-height: 100vh; }

/* Layout */
.app-layout {
  display: flex;
  min-height: 100vh;
}

.sidebar {
  width: 260px;
  background: var(--sidebar-bg);
  color: var(--sidebar-text);
  padding: 24px 0;
  position: fixed;
  height: 100vh;
  overflow-y: auto;
  z-index: 100;
  transition: var(--transition);
}

.sidebar-logo {
  padding: 0 24px;
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar-logo-icon {
  width: 40px;
  height: 40px;
}

.sidebar-logo-text {
  font-family: 'Lora', serif;
  font-size: 22px;
  font-weight: 600;
  color: white;
}

.sidebar-section {
  margin-bottom: 24px;
}

.sidebar-section-title {
  padding: 0 24px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 24px;
  color: var(--sidebar-text);
  cursor: pointer;
  transition: var(--transition);
  border-left: 3px solid transparent;
}

.sidebar-item:hover {
  background: rgba(255,255,255,0.05);
  color: var(--sidebar-active);
}

.sidebar-item.active {
  background: rgba(255,255,255,0.1);
  color: var(--sidebar-active);
  border-left-color: var(--purple);
}

.sidebar-item-icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.7;
}

.sidebar-item.active .sidebar-item-icon,
.sidebar-item:hover .sidebar-item-icon { opacity: 1; }

.sidebar-item-label {
  font-size: 14px;
  font-weight: 500;
}

.sidebar-item-badge {
  margin-left: auto;
  background: var(--purple);
  color: white;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
}

.sidebar-user {
  margin-top: auto;
  padding: 20px 24px;
  border-top: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar-avatar {
  width: 40px;
  height: 40px;
  background: var(--purple);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 600;
}

.sidebar-user-info { flex: 1; }
.sidebar-user-name { font-size: 14px; font-weight: 600; color: white; }
.sidebar-user-email { font-size: 12px; color: var(--text-tertiary); }

/* Main Content */
.main-content {
  flex: 1;
  margin-left: 260px;
  min-height: 100vh;
}

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.header-left { display: flex; align-items: center; gap: 16px; }
.header-title { font-size: 20px; font-weight: 600; }
.header-subtitle { font-size: 13px; color: var(--text-secondary); }

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-search {
  position: relative;
}

.header-search input {
  width: 280px;
  padding: 10px 16px 10px 40px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 14px;
  background: var(--bg);
  transition: var(--transition);
}

.header-search input:focus {
  outline: none;
  border-color: var(--purple);
  background: white;
}

.header-search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-tertiary);
}

.header-btn {
  width: 40px;
  height: 40px;
  border: none;
  background: var(--bg);
  border-radius: var(--radius-md);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  transition: var(--transition);
  position: relative;
}

.header-btn:hover {
  background: var(--purple-light);
  color: var(--purple);
}

.header-btn .notification-dot {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 8px;
  height: 8px;
  background: var(--red);
  border-radius: 50%;
  border: 2px solid var(--surface);
}

.page-content {
  padding: 32px;
}

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.card-title {
  font-size: 16px;
  font-weight: 600;
}

.card-subtitle {
  font-size: 13px;
  color: var(--text-secondary);
}

.card-action {
  font-size: 13px;
  color: var(--purple);
  cursor: pointer;
}

.card-action:hover { text-decoration: underline; }

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
  margin-bottom: 32px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  transition: var(--transition);
}

.stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

.stat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.stat-icon {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
}

.stat-icon-purple { background: var(--purple-light); color: var(--purple); }
.stat-icon-teal { background: var(--teal-light); color: var(--teal); }
.stat-icon-amber { background: var(--amber-light); color: var(--amber); }
.stat-icon-green { background: var(--green-light); color: var(--green); }

.stat-trend {
  font-size: 12px;
  font-weight: 500;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  gap: 4px;
}

.stat-trend.up { background: var(--green-light); color: var(--green); }
.stat-trend.down { background: var(--red-light); color: var(--red); }

.stat-value {
  font-family: 'Space Grotesk', monospace;
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 13px;
  color: var(--text-secondary);
}

.stat-chart {
  margin-top: 16px;
  height: 60px;
}

/* Grid Layout */
.dashboard-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 24px;
  margin-bottom: 32px;
}

/* Login Styles */
.login-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  padding: 20px;
}

.login-card {
  background: white;
  border-radius: var(--radius-xl);
  padding: 48px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.login-header {
  text-align: center;
  margin-bottom: 32px;
}

.login-logo {
  width: 64px;
  height: 64px;
  margin: 0 auto 16px;
}

.login-title {
  font-family: 'Lora', serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--purple);
  margin-bottom: 8px;
}

.login-subtitle {
  color: var(--text-secondary);
  font-size: 14px;
}

.login-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.login-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}

.login-tab {
  flex: 1;
  padding: 12px;
  border: none;
  background: var(--bg);
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  color: var(--text-secondary);
}

.login-tab.active {
  background: var(--purple);
  color: white;
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.input-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
}

.input {
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 14px;
  font-family: inherit;
  transition: var(--transition);
}

.input:focus {
  outline: none;
  border-color: var(--purple);
  box-shadow: 0 0 0 3px rgba(83,74,183,0.1);
}

.login-btn {
  width: 100%;
  padding: 14px;
  background: var(--purple-gradient);
  color: white;
  border: none;
  border-radius: var(--radius-md);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  margin-top: 8px;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-glow);
}

.login-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* Modal Styles */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: white;
  border-radius: var(--radius-xl);
  padding: 32px;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.modal-title {
  font-size: 20px;
  font-weight: 600;
}

.modal-close {
  width: 32px;
  height: 32px;
  border: none;
  background: var(--bg);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  transition: var(--transition);
}

.modal-close:hover {
  background: var(--red-light);
  color: var(--red);
}

.modal-form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.modal-actions {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}

.modal-actions .btn {
  flex: 1;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.select {
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 14px;
  font-family: inherit;
  background: white;
  cursor: pointer;
  transition: var(--transition);
}

.select:focus {
  outline: none;
  border-color: var(--purple);
}

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 16px 24px;
  background: var(--purple);
  color: white;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 500;
  z-index: 2000;
  animation: slideIn 0.3s ease;
  box-shadow: var(--shadow-lg);
}

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.toast.success { background: var(--green); }
.toast.error { background: var(--red); }
.toast.warning { background: var(--amber); }

.charts-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  margin-bottom: 32px;
}

/* Chart Styles */
.chart-container {
  height: 280px;
  position: relative;
}

.chart-legend {
  display: flex;
  gap: 24px;
  margin-top: 16px;
  justify-content: center;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-secondary);
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

/* Pie Chart */
.pie-chart-container {
  display: flex;
  align-items: center;
  gap: 32px;
}

.pie-chart {
  width: 180px;
  height: 180px;
}

.pie-legend {
  flex: 1;
}

.pie-legend-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}

.pie-legend-item:last-child { border-bottom: none; }

.pie-legend-color {
  width: 12px;
  height: 12px;
  border-radius: 3px;
  margin-right: 8px;
}

.pie-legend-label { font-size: 13px; flex: 1; }
.pie-legend-value { font-weight: 600; font-size: 13px; }

/* Transactions */
.transaction-list {
  max-height: 400px;
  overflow-y: auto;
}

.transaction-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}

.transaction-item:last-child { border-bottom: none; }

.transaction-icon {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.transaction-info { flex: 1; }
.transaction-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
.transaction-date { font-size: 12px; color: var(--text-tertiary); }
.transaction-amount { font-weight: 600; font-family: 'Space Grotesk', monospace; }
.transaction-amount.income { color: var(--green); }
.transaction-amount.expense { color: var(--text-primary); }

/* Goals Progress */
.goal-item {
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}

.goal-item:last-child { border-bottom: none; }

.goal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.goal-name { font-size: 14px; font-weight: 500; }
.goal-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: var(--radius-full);
  background: var(--purple-light);
  color: var(--purple);
}

.goal-progress-bar {
  height: 8px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 8px;
}

.goal-progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}

.goal-stats {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-secondary);
}

/* Quick Actions */
.quick-actions {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

.quick-action-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 20px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: var(--transition);
}

.quick-action-btn:hover {
  background: var(--purple-light);
  border-color: var(--purple);
  transform: translateY(-2px);
}

.quick-action-icon {
  width: 48px;
  height: 48px;
  background: var(--purple-light);
  color: var(--purple);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
}

.quick-action-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  text-align: center;
}

/* Alerts */
.alert-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 16px;
  background: var(--bg);
  border-radius: var(--radius-md);
  margin-bottom: 12px;
}

.alert-icon {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.alert-icon.warning { background: var(--amber-light); color: var(--amber); }
.alert-icon.info { background: var(--blue-light); color: var(--blue); }
.alert-icon.success { background: var(--green-light); color: var(--green); }

.alert-content { flex: 1; }
.alert-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.alert-desc { font-size: 13px; color: var(--text-secondary); }

/* Calendar */
.calendar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.calendar-nav {
  display: flex;
  gap: 8px;
}

.calendar-nav-btn {
  width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  background: white;
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}

.calendar-nav-btn:hover { background: var(--purple-light); border-color: var(--purple); }

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.calendar-day-header {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  text-align: center;
  padding: 8px;
}

.calendar-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
}

.calendar-day:hover { background: var(--purple-light); }
.calendar-day.today { background: var(--purple); color: white; }
.calendar-day.has-event::after {
  content: '';
  width: 4px;
  height: 4px;
  background: var(--teal);
  border-radius: 50%;
  position: absolute;
  bottom: 4px;
}

.calendar-day.other-month { color: var(--text-tertiary); }

/* Progress Ring */
.progress-ring-container {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.progress-ring-text {
  position: absolute;
  text-align: center;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  padding: 4px;
  background: var(--bg);
  border-radius: var(--radius-md);
  margin-bottom: 20px;
}

.tab {
  flex: 1;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  color: var(--text-secondary);
}

.tab:hover { color: var(--text-primary); }
.tab.active { background: white; color: var(--purple); box-shadow: var(--shadow-sm); }

/* Input */
.input-group { margin-bottom: 20px; }
.input-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
.input {
  width: 100%;
  padding: 12px 16px;
  font-size: 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: white;
  transition: var(--transition);
}

function LineChart({ data, color = '#534AB7', height = 200 }) {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const padding = 20;
  const width = 400;
  
  const points = data.map((val, i) => {
    const x = padding + (i / (data.length - 1)) * (width - padding * 2);
    const y = height - padding - ((val - min) / range) * (height - padding * 2);
    return `${x},${y}`;
  }).join(' ');
  
  const areaPoints = `${padding},${height - padding} ${points} ${width - padding},${height - padding}`;
  
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id={`gradient-${color.replace('#','')}`} x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={areaPoints} fill={`url(#gradient-${color.replace('#','')})`} />
      <polyline points={points} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      {data.map((val, i) => {
        const x = padding + (i / (data.length - 1)) * (width - padding * 2);
        const y = height - padding - ((val - min) / range) * (height - padding * 2);
        return <circle key={i} cx={x} cy={y} r="4" fill={color} />;
      })}
    </svg>
  );
}

function BarChart({ data, color = '#534AB7', height = 200 }) {
  const max = Math.max(...data);
  const barWidth = 100 / data.length - 2;
  
  return (
    <svg width="100%" height={height} viewBox="0 0 400 200" preserveAspectRatio="xMidYMid meet">
      {data.map((val, i) => {
        const barHeight = (val / max) * (height - 40);
        const x = 20 + (i * 100 / data.length) + '%';
        return (
          <rect
            key={i}
            x={x}
            y={height - 20 - barHeight}
            width={`${barWidth}%`}
            height={barHeight}
            fill={color}
            rx="4"
          />
        );
      })}
    </svg>
  );
}

function DonutChart({ segments, size = 180 }) {
  const total = segments.reduce((sum, s) => sum + s.value, 0);
  let currentAngle = -90;
  
  const paths = segments.map((seg, i) => {
    const angle = (seg.value / total) * 360;
    const startAngle = currentAngle;
    const endAngle = currentAngle + angle;
    currentAngle = endAngle;
    
    const start = polarToCartesian(size/2, size/2, size/2 - 10, startAngle);
    const end = polarToCartesian(size/2, size/2, size/2 - 10, endAngle);
    const largeArcFlag = angle > 180 ? 1 : 0;
    
    const d = `M ${start.x} ${start.y} A ${size/2 - 10} ${size/2 - 10} 0 ${largeArcFlag} 1 ${end.x} ${end.y}`;
    
    return { ...seg, d, color: seg.color || `hsl(${i * 360 / segments.length}, 70%, 50%)` };
  });
  
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {paths.map((path, i) => (
        <path key={i} d={path.d} fill="none" stroke={path.color} strokeWidth="20" />
      ))}
      <circle cx={size/2} cy={size/2} r={size/2 - 30} fill="white" />
    </svg>
  );
}

function polarToCartesian(cx, cy, r, angle) {
  const rad = angle * Math.PI / 180;
  return {
    x: cx + r * Math.cos(rad),
    y: cy + r * Math.sin(rad)
  };
}

function ProgressRing({ progress, size = 120, strokeWidth = 10, color = '#534AB7' }) {
  const radius = (size - strokeWidth) / 2;
  const circumference = radius * 2 * Math.PI;
  const offset = circumference - (progress / 100) * circumference;
  
  return (
    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
      <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="#f0f0f0" strokeWidth={strokeWidth} />
      <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth={strokeWidth} strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" style={{ transition: 'stroke-dashoffset 0.5s ease' }} />
    </svg>
  );
}

function ChatBot({ isOpen, onClose }) {

    'default': "That's a great question! I can help with budgeting, saving, investing, debt management, and more. What would you like to know?"
  };
  
  const handleSend = () => {
    if (!input.trim()) return;

  if (!isOpen) return null;
  
  return (

          <div>

        {messages.map((msg, i) => (

        <button 
          onClick={handleSend}

function Login({ onLogin }) {
  const [isLogin, setIsLogin] = React.useState(true);
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [name, setName] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    setLoading(true);
    setTimeout(() => {
      const user = {
        name: isLogin ? email.split('@')[0] : name,
        email: email,
        avatar: name ? name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2) : email.slice(0, 2).toUpperCase()
      };
      localStorage.setItem('penny_user', JSON.stringify(user));
      onLogin(user);
      setLoading(false);
    }, 800);
  };

  return (
    <div className="login-container">
      <div className="login-card">
        <div className="login-header">
          <svg className="login-logo" viewBox="0 0 64 64" fill="none">
            <ellipse cx="32" cy="36" rx="22" ry="19" fill="#FFB6C1"/>

            <ellipse cx="24" cy="18" rx="3" ry="2" fill="#E87E9E"/>
            <ellipse cx="40" cy="18" rx="3" ry="2" fill="#E87E9E"/>
            <circle cx="28" cy="16" r="2" fill="#333"/>
            <circle cx="36" cy="16" r="2" fill="#333"/>
            <ellipse cx="32" cy="21" rx="3" ry="2" fill="#E87E9E"/>
            <path d="M54 28 Q60 36 54 44" stroke="#E87E9E" strokeWidth="3" fill="none" strokeLinecap="round"/>
            <path d="M16 26 Q10 22 10 30" stroke="#E87E9E" strokeWidth="3" fill="none" strokeLinecap="round"/>
            <path d="M16 46 Q10 50 10 42" stroke="#E87E9E" strokeWidth="3" fill="none" strokeLinecap="round"/>
            <rect x="26" cy="30" width="12" height="10" rx="2" fill="#E87E9E"/>
          </svg>
          <h1 className="login-title">Penny</h1>
          <p className="login-subtitle">Your financial co-pilot for life</p>
        </div>
        
        <div className="login-tabs">
          <button className={`login-tab ${isLogin ? 'active' : ''}`} onClick={() => setIsLogin(true)}>
            Sign In
          </button>
          <button className={`login-tab ${!isLogin ? 'active' : ''}`} onClick={() => setIsLogin(false)}>
            Sign Up
          </button>
        </div>
        
        <form className="login-form" onSubmit={handleSubmit}>
          {!isLogin && (
            <div className="input-group">
              <label className="input-label">Full Name</label>
              <input type="text" className="input" placeholder="Jane Doe" value={name} onChange={e => setName(e.target.value)} required />
            </div>
          )}
          <div className="input-group">
            <label className="input-label">Email</label>
            <input type="email" className="input" placeholder="you@example.com" value={email} onChange={e => setEmail(e.target.value)} required />
          </div>
          <div className="input-group">
            <label className="input-label">Password</label>
            <input type="password" className="input" placeholder="Enter your password" value={password} onChange={e => setPassword(e.target.value)} required />
          </div>
          <button type="submit" className="login-btn" disabled={loading}>
            {loading ? 'Please wait...' : isLogin ? 'Sign In' : 'Create Account'}
          </button>
        </form>
      </div>
    </div>
  );
}

function CalendarView({ events, onAddEvent }) {
  const [currentDate, setCurrentDate] = useState(new Date(2026, 2, 21));
  const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  
  const eventDates = {};
  events.forEach(e => { eventDates[e.date] = e; });
  
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  
  const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
  const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));
  
  const calendarDays = [];
  for (let i = firstDay - 1; i >= 0; i--) {
    calendarDays.push({ day: daysInPrevMonth - i, otherMonth: true });
  }
  for (let i = 1; i <= daysInMonth; i++) {
    calendarDays.push({ day: i, otherMonth: false });
  }
  const remaining = 42 - calendarDays.length;
  for (let i = 1; i <= remaining; i++) {
    calendarDays.push({ day: i, otherMonth: true });
  }
  
  const monthName = currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });
  
  return (
    <div className="card">
      <div className="card-header">
        <div className="card-title">Financial Calendar</div>
        <div className="calendar-nav">
          <button className="calendar-nav-btn" onClick={prevMonth}><Icon name="chevronleft" /></button>
          <span className="font-bold" style={{ minWidth: 140, textAlign: 'center' }}>{monthName}</span>
          <button className="calendar-nav-btn" onClick={nextMonth}><Icon name="chevronright" /></button>
        </div>
      </div>
      <div className="calendar-grid">
        {days.map(day => <div key={day} className="calendar-day-header">{day}</div>)}
        {calendarDays.map((d, i) => {
          const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d.day).padStart(2, '0')}`;
          const hasEvent = eventDates[dateStr];
          const isToday = d.day === 21 && !d.otherMonth;
          return (
            <div key={i} className={`calendar-day ${d.otherMonth ? 'other-month' : ''} ${isToday ? 'today' : ''} ${hasEvent ? 'has-event' : ''}`}>
              {d.day}
            </div>
          );
        })}
      </div>
      <div className="flex justify-between items-center mt-4">
        <div className="card-title mb-0">Upcoming Events</div>
        <button className="btn btn-primary btn-sm" onClick={onAddEvent}><Icon name="plus" size={14} /> Add Event</button>
      </div>
      {events.length === 0 ? (
        <div className="text-center text-secondary" style={{ padding: '24px' }}>No events yet. Add your first event!</div>
      ) : (
        events.map(e => (
          <div key={e.id} className="flex justify-between items-center" style={{ padding: '12px 0', borderBottom: '1px solid var(--border)' }}>
            <div>
              <div className="font-bold">{e.title}</div>
              <div className="text-sm text-secondary">{e.date}</div>
            </div>
            <div className="flex items-center gap-2">
              <span style={{ color: e.color, fontWeight: 600 }}>${e.amount.toLocaleString()}</span>
              <span className={`badge ${e.type === 'income' ? 'badge-green' : 'badge-red'}`}>{e.type === 'income' ? 'Income' : 'Expense'}</span>
            </div>
          </div>
        ))
      )}
    </div>
  );
}

  const [form, setForm] = React.useState({ name: '', amount: 0, category: 'Food', type: 'expense' });
  
  const handleSubmit = (e) => {
    e.preventDefault();
    const amount = form.type === 'income' ? Math.abs(form.amount) : -Math.abs(form.amount);
    onSubmit({ ...form, amount });
  };
  
  return (
    <form className="modal-form" onSubmit={handleSubmit}>
      <div className="input-group">
        <label className="input-label">Transaction Name</label>
        <input type="text" className="input" placeholder="Grocery Store" value={form.name} onChange={e => setForm({...form, name: e.target.value})} required />
      </div>
      <div className="form-row">
        <div className="input-group">
          <label className="input-label">Type</label>
          <select className="input" value={form.type} onChange={e => setForm({...form, type: e.target.value})}>
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>
        <div className="input-group">
          <label className="input-label">Amount ($)</label>
          <input type="number" className="input" placeholder="0.00" step="0.01" value={form.amount} onChange={e => setForm({...form, amount: parseFloat(e.target.value) || 0})} required />
        </div>
      </div>
      <div className="input-group">
        <label className="input-label">Category</label>
        <select className="input" value={form.category} onChange={e => setForm({...form, category: e.target.value})}>
          <option value="Food">Food & Dining</option>
          <option value="Transport">Transportation</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Shopping">Shopping</option>
          <option value="Utilities">Utilities</option>
          <option value="Health">Health</option>
          <option value="Housing">Housing</option>
          <option value="Income">Income</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div className="modal-actions">
        <button type="button" className="btn btn-outline" onClick={onCancel}>Cancel</button>
        <button type="submit" className="btn btn-primary">Add Transaction</button>
      </div>
    </form>
  );
}

function GoalForm({ onSubmit, onCancel }) {
  const [form, setForm] = React.useState({ name: '', target: 0, monthly: 0, deadline: '', color: '#534AB7' });
  
  const handleSubmit = (e) => {
    e.preventDefault();
    onSubmit(form);
  };
  
  return (
    <form className="modal-form" onSubmit={handleSubmit}>
      <div className="input-group">
        <label className="input-label">Goal Name</label>
        <input type="text" className="input" placeholder="Dream Vacation" value={form.name} onChange={e => setForm({...form, name: e.target.value})} required />
      </div>
      <div className="form-row">
        <div className="input-group">
          <label className="input-label">Target Amount ($)</label>
          <input type="number" className="input" placeholder="5000" step="1" value={form.target} onChange={e => setForm({...form, target: parseInt(e.target.value) || 0})} required />
        </div>
        <div className="input-group">
          <label className="input-label">Monthly Contribution ($)</label>
          <input type="number" className="input" placeholder="300" step="1" value={form.monthly} onChange={e => setForm({...form, monthly: parseInt(e.target.value) || 0})} required />
        </div>
      </div>
      <div className="input-group">
        <label className="input-label">Target Date</label>
        <input type="text" className="input" placeholder="Dec 2026" value={form.deadline} onChange={e => setForm({...form, deadline: e.target.value})} required />
      </div>
      <div className="input-group">
        <label className="input-label">Color</label>
        <div className="flex gap-2">
          {['#534AB7', '#1D9E75', '#BA7517', '#DC3545', '#28A745', '#6c757d'].map(color => (
            <div key={color} onClick={() => setForm({...form, color})} style={{ width: 32, height: 32, borderRadius: 8, background: color, cursor: 'pointer', border: form.color === color ? '3px solid #333' : 'none' }} />
          ))}
        </div>
      </div>
      <div className="modal-actions">
        <button type="button" className="btn btn-outline" onClick={onCancel}>Cancel</button>
        <button type="submit" className="btn btn-primary">Create Goal</button>
      </div>
    </form>
  );
}

function BudgetForm({ budgets, onSubmit, onCancel }) {
  const [form, setForm] = React.useState(budgets);
  
  const handleChange = (index, field, value) => {
    const newBudgets = [...form];
    newBudgets[index] = { ...newBudgets[index], [field]: value };
    setForm(newBudgets);
  };
  
  const handleSubmit = (e) => {
    e.preventDefault();
    onSubmit(form);
  };
  
  return (
    <form className="modal-form" onSubmit={handleSubmit} style={{ maxHeight: '400px', overflowY: 'auto' }}>
      {form.map((budget, i) => (
        <div key={i} className="form-row" style={{ alignItems: 'center', marginBottom: '12px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px', flex: 1 }}>
            <div style={{ width: 12, height: 12, borderRadius: 3, background: budget.color }}></div>
            <span style={{ fontSize: '14px', fontWeight: 500 }}>{budget.category}</span>
          </div>
          <div className="input-group" style={{ marginBottom: 0, flex: 1 }}>
            <input 
              type="number" 
              className="input" 
              value={budget.budget} 
              onChange={e => handleChange(i, 'budget', parseInt(e.target.value) || 0)}
              style={{ textAlign: 'right' }}
            />
          </div>
        </div>
      ))}
      <div className="modal-actions">
        <button type="button" className="btn btn-outline" onClick={onCancel}>Cancel</button>
        <button type="submit" className="btn btn-primary">Save Budgets</button>
      </div>
    </form>
  );
}

function CalendarForm({ onSubmit, onCancel }) {
  const [form, setForm] = React.useState({ title: '', date: '', amount: 0, type: 'expense', color: '#DC3545' });
  
  const handleSubmit = (e) => {
    e.preventDefault();
    onSubmit(form);
  };
  
  return (
    <form className="modal-form" onSubmit={handleSubmit}>
      <div className="input-group">
        <label className="input-label">Event Title</label>
        <input type="text" className="input" placeholder="Rent Payment" value={form.title} onChange={e => setForm({...form, title: e.target.value})} required />
      </div>
      <div className="form-row">
        <div className="input-group">
          <label className="input-label">Date</label>
          <input type="date" className="input" value={form.date} onChange={e => setForm({...form, date: e.target.value})} required />
        </div>
        <div className="input-group">
          <label className="input-label">Amount ($)</label>
          <input type="number" className="input" placeholder="0.00" step="0.01" value={form.amount} onChange={e => setForm({...form, amount: parseFloat(e.target.value) || 0})} required />
        </div>
      </div>
      <div className="form-row">
        <div className="input-group">
          <label className="input-label">Type</label>
          <select className="input" value={form.type} onChange={e => setForm({...form, type: e.target.value, color: e.target.value === 'income' ? '#28A745' : '#DC3545'})}>
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>
        <div className="input-group">
          <label className="input-label">Color</label>
          <div className="flex gap-2">
            <div onClick={() => setForm({...form, color: '#DC3545'})} style={{ width: 32, height: 32, borderRadius: 8, background: '#DC3545', cursor: 'pointer', border: form.color === '#DC3545' ? '3px solid #333' : 'none' }} />
            <div onClick={() => setForm({...form, color: '#28A745'})} style={{ width: 32, height: 32, borderRadius: 8, background: '#28A745', cursor: 'pointer', border: form.color === '#28A745' ? '3px solid #333' : 'none' }} />
            <div onClick={() => setForm({...form, color: '#534AB7'})} style={{ width: 32, height: 32, borderRadius: 8, background: '#534AB7', cursor: 'pointer', border: form.color === '#534AB7' ? '3px solid #333' : 'none' }} />
          </div>
        </div>
      </div>
      <div className="modal-actions">
        <button type="button" className="btn btn-outline" onClick={onCancel}>Cancel</button>
        <button type="submit" className="btn btn-primary">Add Event</button>
      </div>
    </form>
  );
}

function App() {
  const [user, setUser] = useState(() => {
    const saved = localStorage.getItem('penny_user');
    return saved ? JSON.parse(saved) : null;
  });
  
  const [activeView, setActiveView] = useState('dashboard');
  const [toast, setToast] = React.useState(null);
  
  const [accounts, setAccounts] = useState([
    { id: 1, name: 'Checking Account', bank: 'Chase Bank', balance: 8456.23, type: 'checking', last4: '4582' },
    { id: 2, name: 'Savings Account', bank: 'Ally Bank', balance: 12890.00, type: 'savings', last4: '7891' },
    { id: 3, name: 'Credit Card', bank: 'Capital One', balance: -1234.56, type: 'credit', last4: '3456' },
    { id: 4, name: 'Investment Portfolio', bank: 'Fidelity', balance: 4567.89, type: 'investment', last4: '9012' },
  ]);
  
  const [transactions, setTransactions] = useState([
    { id: 1, name: 'Netflix', date: '2026-03-21', amount: -15.99, category: 'Entertainment', type: 'expense' },
    { id: 2, name: 'Salary', date: '2026-03-20', amount: 3500, category: 'Income', type: 'income' },
    { id: 3, name: 'Whole Foods', date: '2026-03-20', amount: -87.32, category: 'Food', type: 'expense' },
    { id: 4, name: 'Uber', date: '2026-03-19', amount: -24.50, category: 'Transport', type: 'expense' },
    { id: 5, name: 'Amazon', date: '2026-03-18', amount: -156.00, category: 'Shopping', type: 'expense' },
    { id: 6, name: 'Electric Bill', date: '2026-03-17', amount: -89.00, category: 'Utilities', type: 'expense' },
    { id: 7, name: 'Freelance', date: '2026-03-15', amount: 800, category: 'Income', type: 'income' },
    { id: 8, name: 'Grocery Store', date: '2026-03-15', amount: -65.40, category: 'Food', type: 'expense' },
    { id: 9, name: 'Gas Station', date: '2026-03-14', amount: -45.00, category: 'Transport', type: 'expense' },
    { id: 10, name: 'Restaurant', date: '2026-03-13', amount: -52.80, category: 'Food', type: 'expense' },
  ]);
  
  const [goals, setGoals] = useState([
    { id: 1, name: 'Emergency Fund', target: 10000, current: 8500, monthly: 500, deadline: 'Dec 2026', color: '#534AB7' },
    { id: 2, name: 'Dream Vacation', target: 5000, current: 2400, monthly: 300, deadline: 'Aug 2026', color: '#1D9E75' },
    { id: 3, name: 'New Car Down Payment', target: 15000, current: 4200, monthly: 800, deadline: 'Jun 2027', color: '#BA7517' },
    { id: 4, name: 'Home Office Setup', target: 3000, current: 2100, monthly: 200, deadline: 'Apr 2026', color: '#28A745' },
    { id: 5, name: 'Wedding Fund', target: 20000, current: 3500, monthly: 1000, deadline: 'Oct 2027', color: '#DC3545' },
  ]);
  
  const [modal, setModal] = React.useState({ open: false, type: null, title: '' });
  const [showChat, setShowChat] = React.useState(false);
  
  const viewTitles = {
    dashboard: 'Dashboard',
    accounts: 'Accounts',
    transactions: 'Transactions',
    budgets: 'Budgets',
    goals: 'Goals',
    calendar: 'Calendar',
    reports: 'Reports',
    insights: 'Insights',
    achievements: 'Achievements',
    settings: 'Settings',
  };
  
  const showToast = (message, type = 'success') => {
    setToast({ message, type });
    setTimeout(() => setToast(null), 3000);
  };
  
  const handleLogin = (userData) => {
    setUser(userData);
  };
  
  const handleLogout = () => {
    localStorage.removeItem('penny_user');
    setUser(null);
  };
  
  const [darkMode, setDarkMode] = React.useState(() => localStorage.getItem('penny_darkMode') === 'true');
  const [notifications, setNotifications] = React.useState([
    { id: 1, type: 'warning', title: 'Subscription Renewal', desc: 'Spotify annual plan renews in 3 days', time: '2h ago', read: false },
    { id: 2, type: 'info', title: 'Bill Due Soon', desc: 'Credit card payment due in 5 days', time: '5h ago', read: false },
    { id: 3, type: 'success', title: 'Goal Milestone', desc: 'You reached 85% of your Emergency Fund goal!', time: '1d ago', read: true },
  ]);
  const [showNotifications, setShowNotifications] = React.useState(false);
  const [emailNotifications, setEmailNotifications] = React.useState(true);
  const [budgetAlerts, setBudgetAlerts] = React.useState(true);
  const [budgets, setBudgets] = React.useState([
    { category: 'Housing', budget: 1500, spent: 1200, color: '#534AB7' },
    { category: 'Food & Dining', budget: 600, spent: 580, color: '#1D9E75' },
    { category: 'Transportation', budget: 400, spent: 340, color: '#BA7517' },
    { category: 'Entertainment', budget: 200, spent: 180, color: '#DC3545' },
    { category: 'Shopping', budget: 300, spent: 250, color: '#28A745' },
    { category: 'Utilities', budget: 250, spent: 180, color: '#6c757d' },
    { category: 'Health', budget: 150, spent: 90, color: '#e83e8c' },
    { category: 'Personal', budget: 200, spent: 120, color: '#17a2b8' },
  ]);
  const [calendarEvents, setCalendarEvents] = React.useState([
    { id: 1, title: 'Rent Payment', date: '2026-03-25', amount: 1500, type: 'expense', color: '#DC3545' },
    { id: 2, title: 'Paycheck', date: '2026-03-28', amount: 3500, type: 'income', color: '#28A745' },
    { id: 3, title: 'Netflix Due', date: '2026-03-30', amount: 15.99, type: 'expense', color: '#534AB7' },
  ]);

  React.useEffect(() => {
    if (darkMode) {
      document.documentElement.style.setProperty('--bg', '#1a1a2e');
      document.documentElement.style.setProperty('--bg-secondary', '#16213e');
      document.documentElement.style.setProperty('--surface', '#0f3460');
      document.documentElement.style.setProperty('--text-primary', '#ffffff');
      document.documentElement.style.setProperty('--text-secondary', '#a0a0b8');
      document.documentElement.style.setProperty('--border', 'rgba(255,255,255,0.1)');
    } else {
      document.documentElement.style.setProperty('--bg', '#f5f4f7');
      document.documentElement.style.setProperty('--bg-secondary', '#ffffff');
      document.documentElement.style.setProperty('--surface', '#ffffff');
      document.documentElement.style.setProperty('--text-primary', '#1a1a1a');
      document.documentElement.style.setProperty('--text-secondary', '#6b6b6b');
      document.documentElement.style.setProperty('--border', 'rgba(0,0,0,0.08)');
    }
    localStorage.setItem('penny_darkMode', darkMode);
  }, [darkMode]);

  const unreadCount = notifications.filter(n => !n.read).length;
  
  const handleQuickAction = (action) => {
    const titles = { transaction: 'Add Transaction', goal: 'New Goal', account: 'Add Account' };
    setModal({ open: true, type: action, title: titles[action] || 'Add Item' });
  };
  
  const handleAddAccount = () => {
    setModal({ open: true, type: 'account', title: 'Add Account' });
  };
  
  const handleAddTransaction = () => {
    setModal({ open: true, type: 'transaction', title: 'Add Transaction' });
  };
  
  const handleAddGoal = () => {
    setModal({ open: true, type: 'goal', title: 'New Goal' });
  };
  
  const handleEditBudgets = () => {
    setModal({ open: true, type: 'budget', title: 'Edit Budgets' });
  };
  
  const handleEditCalendar = () => {
    setModal({ open: true, type: 'calendar', title: 'Add Calendar Event' });
  };
  
  const closeModal = () => {
    setModal({ open: false, type: null, title: '' });
  };
  
  const handleAddItem = (type, data) => {
    if (type === 'account') {
      const newAccount = { ...data, id: Date.now(), last4: data.last4 || Math.floor(1000 + Math.random() * 9000).toString() };
      setAccounts([...accounts, newAccount]);
      showToast('Account added successfully!', 'success');
    } else if (type === 'transaction') {
      const newTransaction = { ...data, id: Date.now(), date: new Date().toISOString().split('T')[0] };
      setTransactions([newTransaction, ...transactions]);
      showToast('Transaction added!', 'success');
    } else if (type === 'goal') {
      const newGoal = { ...data, id: Date.now(), current: 0, color: data.color || '#534AB7' };
      setGoals([...goals, newGoal]);
      showToast('Goal created!', 'success');
    } else if (type === 'budget') {
      setBudgets(data);
      showToast('Budgets updated!', 'success');
    } else if (type === 'calendar') {
      const newEvent = { ...data, id: Date.now() };
      setCalendarEvents([...calendarEvents, newEvent]);
      showToast('Event added!', 'success');
    }
    closeModal();
  };
  
  const renderModalContent = () => {
    switch (modal.type) {
      case 'account':
        return <AccountForm onSubmit={(data) => handleAddItem('account', data)} onCancel={closeModal} />;
      case 'transaction':
        return <TransactionForm onSubmit={(data) => handleAddItem('transaction', data)} onCancel={closeModal} />;
      case 'goal':
        return <GoalForm onSubmit={(data) => handleAddItem('goal', data)} onCancel={closeModal} />;
      case 'budget':
        return <BudgetForm budgets={budgets} onSubmit={(data) => handleAddItem('budget', data)} onCancel={closeModal} />;
      case 'calendar':
        return <CalendarForm onSubmit={(data) => handleAddItem('calendar', data)} onCancel={closeModal} />;
      default:
        return null;
    }
  };
  
  const renderView = () => {
    switch (activeView) {
      case 'dashboard': return <Dashboard onQuickAction={handleQuickAction} onNavigate={setActiveView} />;
      case 'accounts': return <AccountsView accounts={accounts} onAddAccount={handleAddAccount} onShowToast={showToast} />;
      case 'transactions': return <TransactionsView transactions={transactions} onAddTransaction={handleAddTransaction} onShowToast={showToast} />;
      case 'budgets': return <BudgetsView budgets={budgets} onEditBudgets={handleEditBudgets} onShowToast={showToast} />;
      case 'goals': return <GoalsView goals={goals} onAddGoal={handleAddGoal} onShowToast={showToast} />;
      case 'calendar': return <CalendarView events={calendarEvents} onAddEvent={handleEditCalendar} />;
      case 'reports': return <ReportsView onExport={() => handleExport()} onShowToast={showToast} />;
      case 'insights': return <InsightsView />;
      case 'achievements': return <AchievementsView />;
      case 'settings': return <SettingsView 
        darkMode={darkMode} 
        onToggleDarkMode={() => setDarkMode(!darkMode)}
        emailNotifications={emailNotifications}
        onToggleEmail={() => setEmailNotifications(!emailNotifications)}
        budgetAlerts={budgetAlerts}
        onToggleBudget={() => setBudgetAlerts(!budgetAlerts)}
        onShowToast={showToast} 
      />;
      default: return <Dashboard onQuickAction={handleQuickAction} onNavigate={setActiveView} />;
    }
  };
  
  const handleExport = () => {
    const data = {
      exported: new Date().toISOString(),
      accounts,
      transactions,
      goals,
      budgets,
      calendarEvents
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'penny-export.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Data exported successfully!', 'success');
  };
  
  if (!user) {
    return <Login onLogin={handleLogin} />;
  }
  
  return (
    <div className="app-layout">
      <Sidebar activeView={activeView} onNavigate={setActiveView} user={user} onLogout={handleLogout} />
      <main className="main-content">
        <Header title={viewTitles[activeView]} notifications={notifications} onToggleNotifications={() => setShowNotifications(!showNotifications)} />
        <div className="page-content">
          {renderView()}
        </div>
      </main>
      
      {showNotifications && (
        <div className="modal-overlay" onClick={() => setShowNotifications(false)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 400 }}>
            <div className="modal-header">
              <h2 className="modal-title">Notifications</h2>
              <button className="modal-close" onClick={() => setShowNotifications(false)}><Icon name="x" /></button>
            </div>
            {notifications.length === 0 ? (
              <div className="text-center text-secondary" style={{ padding: 24 }}>No notifications</div>
            ) : (
              notifications.map(n => (
                <div key={n.id} className="flex gap-3" style={{ padding: '12px 0', borderBottom: '1px solid var(--border)', opacity: n.read ? 0.7 : 1 }}>
                  <div className={`stat-icon stat-icon-${n.type === 'success' ? 'green' : n.type === 'warning' ? 'amber' : 'purple'}`} style={{ width: 36, height: 36, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <Icon name={n.type === 'success' ? 'check' : n.type === 'warning' ? 'bell' : 'zap'} size={16} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <div className="font-bold" style={{ fontSize: 14 }}>{n.title}</div>
                    <div className="text-sm text-secondary">{n.desc}</div>
                    <div className="text-xs text-tertiary">{n.time}</div>
                  </div>
                </div>
              ))
            )}
            <button className="btn btn-outline mt-4" onClick={() => { setNotifications(notifications.map(n => ({ ...n, read: true }))); setShowNotifications(false); }} style={{ width: '100%' }}>
              Mark all as read
            </button>
          </div>
        </div>
      )}
      
      <Modal isOpen={modal.open} onClose={closeModal} title={modal.title}>
        {renderModalContent()}
      </Modal>
      
      <ChatBot isOpen={showChat} onClose={() => setShowChat(false)} />
      
      {!showChat && (
        <button 
          onClick={() => setShowChat(true)}
          style={{
            position: 'fixed',
            bottom: 24,
            right: 24,
            width: 60,
            height: 60,
            background: 'var(--purple-gradient)',
            border: 'none',
            borderRadius: '50%',
            cursor: 'pointer',
            boxShadow: '0 4px 20px rgba(83, 74, 183, 0.4)',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            zIndex: 999
          }}
        >
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2">
            <path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2z"/>
            <circle cx="9" cy="10" r="1.5" fill="white"/>
            <circle cx="15" cy="10" r="1.5" fill="white"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          </svg>
        </button>
      )}
      
      {toast && <div className={`toast ${toast.type}`}>{toast.message}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
